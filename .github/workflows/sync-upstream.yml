name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  sync:
    name: Sync from paperclipai/paperclip
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/paperclipai/paperclip.git
          git fetch upstream master

      - name: Check sync status
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count)
          UPSTREAM_SHA=$(git rev-parse --short upstream/master)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          if [ "$BEHIND" = "0" ]; then
            echo "Already up to date with upstream ($(git rev-parse --short HEAD))."
          else
            echo "$BEHIND commits behind upstream/master @ $UPSTREAM_SHA"
          fi

      - name: Attempt auto-merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          git merge upstream/master --no-edit \
            -m "chore: sync upstream paperclipai/paperclip @ ${{ steps.check.outputs.upstream_sha }}"
          echo "status=clean" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Push merged changes
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status == 'clean'
        run: |
          git push origin master
          echo "✅ Auto-merged and pushed ${{ steps.check.outputs.behind }} commits from upstream."

      # --- Conflict fallback: push upstream as a branch, open a PR ---

      - name: Prepare conflict branch
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status != 'clean'
        id: conflict
        run: |
          git merge --abort 2>/dev/null || true
          BRANCH="sync/upstream-${{ github.run_id }}"
          git checkout -b "$BRANCH" upstream/master
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Open conflict PR
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status != 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base master \
            --head "${{ steps.conflict.outputs.branch }}" \
            --title "⚠️ Upstream sync needs manual review (${{ steps.check.outputs.behind }} commits)" \
            --body "$(cat <<'EOF'
          Auto-merge from [paperclipai/paperclip](https://github.com/paperclipai/paperclip) failed due to conflicts.

          **${{ steps.check.outputs.behind }} commits** from upstream \`master\` @ \`${{ steps.check.outputs.upstream_sha }}\` need to be merged manually.

          ## What to check before merging

          Our custom code lives in these directories — resolve any conflicts here carefully:

          | Path | What it is |
          |------|------------|
          | `packages/adapters/openclaw-gateway/` | Our enhanced OpenClaw adapter |
          | `packages/integrations/` | Shared integration types and company templates |
          | `cli/src/commands/onboard.ts` | Our OpenClaw auto-detection additions |

          Everything else can be accepted from upstream as-is.

          ## To merge locally

          \`\`\`bash
          git fetch origin
          git checkout master
          git merge origin/${{ steps.conflict.outputs.branch }}
          # Resolve conflicts, then:
          git push origin master
          \`\`\`
          EOF
          )" \
            --label "upstream-sync"
