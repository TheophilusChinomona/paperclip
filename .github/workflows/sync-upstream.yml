name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  sync:
    name: Sync from paperclipai/paperclip
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/paperclipai/paperclip.git
          git fetch upstream master

      - name: Check if behind upstream
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "Fork is $BEHIND commits behind upstream/master"

      - name: Create sync PR
        if: steps.check.outputs.behind != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync upstream paperclipai/paperclip'
          branch: sync/upstream-${{ github.run_id }}
          base: master
          title: 'chore: sync ${{ steps.check.outputs.behind }} upstream commits from paperclipai/paperclip'
          body: |
            This PR syncs changes from [paperclipai/paperclip](https://github.com/paperclipai/paperclip) upstream.

            **${{ steps.check.outputs.behind }} new commits** from upstream `master`.

            ## Before merging
            Check for conflicts with our custom code:
            - `packages/adapters/openclaw-gateway/` — our enhanced OpenClaw adapter
            - `packages/integrations/` — shared integration types and templates
            - `cli/src/commands/onboard.ts` — our OpenClaw auto-detection additions

            Auto-generated by [sync-upstream workflow](https://github.com/${{ github.repository }}/actions/workflows/sync-upstream.yml).
          labels: upstream-sync
